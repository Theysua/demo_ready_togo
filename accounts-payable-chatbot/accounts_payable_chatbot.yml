    - data:
        classes:
        - id: '1'
          name: 'The user''s intent is to query specific business document information
            or request a system action to be executed.

            These questions generally contain specific document numbers (e.g., INV-1001,
            PO-9901) or explicit action verbs (e.g., check status, approve, reject,
            remind, post GR).


            Examples:

            - "Please check the payment status for invoice INV-2001."

            - "The amount on this bill is correct, please approve INV-1002."

            - "Invoice INV-1001 seems to be missing a GR, please post a Goods Receipt
            for 100 pieces."

            - "The system shows this invoice is stuck with the approver, can you send
            a reminder email to them?"

            - "What is the total amount for the invoice attached to PO-9903?"

            '
        - id: '2'
          name: 'The user''s intent is to understand company Accounts Payable policies,
            payment terms, system error explanations, or standard operating procedures.

            These questions are generic, seeking knowledge answers and guidance, rather
            than inquiring about or modifying a specific, individual invoice.


            Examples:

            - "What are our company''s standard Payment Terms?"

            - "I received an invoice without any PO number, how should I process it?"

            - "If the invoice amount does not match the system, what is the accepted
            tolerance limit?"

            - "I cannot log into SAP to approve invoices, who should I contact for
            support?"

            - "If a vendor wants to change their bank account details, what documents
            are required?"

            '
        - id: '1773618206020'
          name: 'The user''s intent is merely polite greetings, small talk, or asking
            questions completely unrelated to finance, accounts payable, or warranties.
            This category is also used to catch any inputs that cannot be classified
            into the above business categories.


            Examples:

            - "Hello there!"

            - "Good morning, the weather is nice today."

            - "Can you write Python code?"

            - "Tell me a joke."

            '
        instructions: 'Class 1 is only for read-only invoice status or amount lookups.
          If the vendor asks to approve, reject, expedite, escalate, override, or
          perform any internal action, you must choose Class 2 even when an invoice
          number is present. When in doubt between Class 1 and Class 2 for an action
          request, choose Class 2.'
